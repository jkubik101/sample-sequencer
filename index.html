<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sequencer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #1c1c1e;
    --surface: #252527;
    --border: #333336;
    --text: #d4d4d6;
    --muted: #5a5a5e;
    --cell-off: #2e2e31;
    --cell-off-hover: #363639;
    --cell-on: #a8a8ab;
    --accent: #6b6b70;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .app {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    width: 100%;
    max-width: 700px;
  }

  /* ── Set tab strip ── */
  .set-tabs {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
    padding-top: 52px; /* align with grid top, below header */
  }

  .tabs-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    text-align: center;
  }

  .set-tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 0;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.1s;
    width: 40px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }

  .set-tab:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .set-tab.active {
    border-color: var(--accent);
    color: var(--text);
    background: var(--surface);
  }

  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .set-tab.loaded .dot { background: #5a7a5a; }
  .set-tab.error  .dot { background: #7a4a4a; }

  /* ── Main ── */
  .main {
    flex: 1;
    min-width: 0;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  h1 {
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .step-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .step-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.1s;
  }

  .step-btn.active {
    border-color: var(--accent);
    color: var(--text);
    background: var(--surface);
  }

  .grid-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .col-indicators {
    display: flex;
    gap: 6px;
    margin-left: 34px;
    margin-bottom: 10px;
  }

  .col-indicator {
    flex: 1;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    transition: background 0.06s;
  }

  .col-indicator.active-col { background: #c0c0c4; }

  .grid-row-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .grid-row-wrapper:last-child { margin-bottom: 0; }

  .row-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    width: 26px;
    text-align: right;
    flex-shrink: 0;
  }

  .grid-row {
    display: flex;
    gap: 6px;
    flex: 1;
  }

  .cell {
    flex: 1;
    aspect-ratio: 1.4 / 1;
    background: var(--cell-off);
    border-radius: 3px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.08s, border-color 0.08s;
  }

  .cell:hover          { background: var(--cell-off-hover); }
  .cell.on             { background: var(--cell-on); }
  .cell.on:hover       { background: #c0c0c4; }
  .cell.col-playing    { border-color: var(--accent); }
  .cell.on.col-playing { background: #d0d0d4; border-color: transparent; }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .play-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.1s;
    min-width: 80px;
  }

  .play-btn:hover   { border-color: var(--accent); background: var(--surface); }
  .play-btn.playing { border-color: var(--accent); }

  .status {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .status.error { color: #9a4a4a; }

  #loading-notice {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 18px;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="app">

  <!-- Left tab strip -->
  <nav class="set-tabs" id="set-tabs">
    <div class="tabs-label">set</div>
    <!-- injected by JS -->
  </nav>

  <!-- Main panel -->
  <div class="main">
    <header>
      <h1>Sequencer</h1>
      <div class="step-toggle">
        <span class="step-label">steps</span>
        <button class="step-btn active" data-steps="4">4</button>
        <button class="step-btn" data-steps="8">8</button>
      </div>
    </header>

    <div class="grid-container">
      <div class="col-indicators" id="col-indicators"></div>
      <div id="grid"></div>
    </div>

    <div class="controls">
      <button class="play-btn" id="play-btn">Play</button>
      <span class="status" id="status">stopped</span>
    </div>

    <div id="loading-notice"></div>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const NUM_SETS        = 5;
const NUM_ROWS        = 5;
const SAMPLE_DURATION = 2.0;  // seconds — all samples are exactly 2s
const SCHEDULE_AHEAD  = 0.1;  // look-ahead window in seconds

const AUDIO_PATH = 'audio/'; // folder where .wav files live (trailing slash, or '' for same dir)

// SETS[s] = array of filenames for set s+1
const SETS = Array.from({length: NUM_SETS}, (_, s) =>
  Array.from({length: NUM_ROWS}, (_, r) => `${AUDIO_PATH}${s + 1}_${r + 1}.wav`)
);

// ─── State ────────────────────────────────────────────────────────────────────
let activeSet  = 0;
let numCols    = 4;

// Per-set grids
let grids = Array.from({length: NUM_SETS}, () =>
  Array.from({length: NUM_ROWS}, () => new Array(numCols).fill(false))
);

let currentCol = -1;
let isPlaying  = false;

// Audio
let audioCtx = null;
let buffers  = {};  // 'N_M.wav' → AudioBuffer

// Scheduler
let scheduleTimer = null;
let nextStepTime  = 0;
let nextStepCol   = 0;
let pendingVisual = [];  // [{col, time}]

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const setTabsEl     = document.getElementById('set-tabs');
const gridEl        = document.getElementById('grid');
const indicatorsEl  = document.getElementById('col-indicators');
const playBtn       = document.getElementById('play-btn');
const statusEl      = document.getElementById('status');
const loadingNotice = document.getElementById('loading-notice');

// ─── Set tabs ─────────────────────────────────────────────────────────────────
function buildSetTabs() {
  setTabsEl.querySelectorAll('.set-tab').forEach(el => el.remove());
  for (let s = 0; s < NUM_SETS; s++) {
    const btn = document.createElement('button');
    btn.className = 'set-tab' + (s === activeSet ? ' active' : '');
    btn.dataset.set = s;
    btn.innerHTML = `${s + 1}<span class="dot"></span>`;
    btn.title = `Set ${s + 1}`;
    btn.addEventListener('click', () => switchSet(s));
    setTabsEl.appendChild(btn);
  }
}

function updateTabDot(s, state) {
  const tab = setTabsEl.querySelector(`.set-tab[data-set="${s}"]`);
  if (!tab) return;
  tab.classList.remove('loaded', 'error');
  if (state) tab.classList.add(state);
}

function switchSet(s) {
  if (s === activeSet) return;
  if (isPlaying) stop();
  activeSet  = s;
  currentCol = -1;
  setTabsEl.querySelectorAll('.set-tab').forEach((el, i) =>
    el.classList.toggle('active', i === s));
  renderGrid();
  updateStatus();
}

// ─── Grid ─────────────────────────────────────────────────────────────────────
function activeGrid() { return grids[activeSet]; }

function resizeAllGrids(newCols) {
  grids = grids.map(g =>
    Array.from({length: NUM_ROWS}, (_, r) =>
      Array.from({length: newCols}, (_, c) => g[r]?.[c] ?? false))
  );
}

function renderGrid() {
  const g = activeGrid();

  indicatorsEl.innerHTML = '';
  for (let c = 0; c < numCols; c++) {
    const d = document.createElement('div');
    d.className = 'col-indicator' + (c === currentCol ? ' active-col' : '');
    d.dataset.col = c;
    indicatorsEl.appendChild(d);
  }

  gridEl.innerHTML = '';
  for (let r = 0; r < NUM_ROWS; r++) {
    const wrap = document.createElement('div');
    wrap.className = 'grid-row-wrapper';

    const lbl = document.createElement('div');
    lbl.className = 'row-label';
    lbl.textContent = String(r + 1).padStart(2, '0');
    wrap.appendChild(lbl);

    const row = document.createElement('div');
    row.className = 'grid-row';
    for (let c = 0; c < numCols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell'
        + (g[r][c]          ? ' on'          : '')
        + (c === currentCol ? ' col-playing' : '');
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.addEventListener('click', onCellClick);
      row.appendChild(cell);
    }
    wrap.appendChild(row);
    gridEl.appendChild(wrap);
  }
}

function setColHighlight(col) {
  indicatorsEl.querySelectorAll('.col-indicator').forEach((el, i) =>
    el.classList.toggle('active-col', i === col));
  gridEl.querySelectorAll('.cell').forEach(el =>
    el.classList.toggle('col-playing', parseInt(el.dataset.col) === col));
}

function onCellClick(e) {
  const r = parseInt(e.currentTarget.dataset.row);
  const c = parseInt(e.currentTarget.dataset.col);
  const g = activeGrid();
  if (g[r][c]) {
    g[r][c] = false;
  } else {
    for (let row = 0; row < NUM_ROWS; row++) g[row][c] = false;
    g[r][c] = true;
  }
  gridEl.querySelectorAll('.cell').forEach(el => {
    const er = parseInt(el.dataset.row), ec = parseInt(el.dataset.col);
    el.classList.toggle('on', g[er][ec]);
  });
}

// ─── Step toggle ──────────────────────────────────────────────────────────────
document.querySelectorAll('.step-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const n = parseInt(btn.dataset.steps);
    if (n === numCols) return;
    if (isPlaying) stop();
    numCols = n;
    document.querySelectorAll('.step-btn').forEach(b =>
      b.classList.toggle('active', b === btn));
    resizeAllGrids(n);
    currentCol = -1;
    renderGrid();
  });
});

// ─── Status ───────────────────────────────────────────────────────────────────
function updateStatus() {
  if (isPlaying) return;
  const files    = SETS[activeSet];
  const nLoaded  = files.filter(f => buffers[f]).length;
  if (nLoaded === files.length) {
    statusEl.textContent = 'ready';
    statusEl.classList.remove('error');
  } else if (nLoaded === 0) {
    statusEl.textContent = 'no audio';
    statusEl.classList.add('error');
  } else {
    statusEl.textContent = 'partial';
    statusEl.classList.remove('error');
  }
}

// ─── Audio loading ────────────────────────────────────────────────────────────
async function loadAllSamples() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  loadingNotice.textContent = 'Loading samples…';
  statusEl.textContent = 'loading…';
  statusEl.classList.remove('error');

  const allFiles = SETS.flat();
  let totalLoaded = 0, totalFailed = 0;

  await Promise.all(allFiles.map(async file => {
    try {
      const res = await fetch(file);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const ab = await res.arrayBuffer();
      buffers[file] = await audioCtx.decodeAudioData(ab);
      totalLoaded++;
    } catch(e) {
      totalFailed++;
      console.warn('Could not load', file, e);
    }
  }));

  // Update tab dots
  for (let s = 0; s < NUM_SETS; s++) {
    const n = SETS[s].filter(f => buffers[f]).length;
    updateTabDot(s, n === SETS[s].length ? 'loaded' : n === 0 ? 'error' : 'loaded');
  }

  if (totalFailed === allFiles.length) {
    loadingNotice.innerHTML =
      `<span style="color:#9a4a4a">No samples loaded — is this running on a local server?<br>` +
      `Run <code>start.sh</code> / <code>start.bat</code>, or:<br>` +
      `<code>python3 -m http.server 8080</code></span>`;
  } else if (totalFailed > 0) {
    loadingNotice.textContent = `${totalLoaded}/${allFiles.length} samples loaded.`;
  } else {
    loadingNotice.textContent = `${totalLoaded} samples loaded. Ready.`;
  }

  updateStatus();
}

// ─── Scheduler (Web Audio look-ahead) ────────────────────────────────────────
function scheduleAhead() {
  const until = audioCtx.currentTime + SCHEDULE_AHEAD;
  const files  = SETS[activeSet];
  const g      = activeGrid();

  while (nextStepTime < until) {
    const col = nextStepCol;
    const t   = nextStepTime;

    for (let r = 0; r < NUM_ROWS; r++) {
      if (g[r][col] && buffers[files[r]]) {
        const src = audioCtx.createBufferSource();
        src.buffer = buffers[files[r]];
        src.connect(audioCtx.destination);
        src.start(t);
      }
    }

    pendingVisual.push({col, time: t});
    nextStepTime += SAMPLE_DURATION;
    nextStepCol   = (nextStepCol + 1) % numCols;
  }

  scheduleTimer = setTimeout(scheduleAhead, (SCHEDULE_AHEAD * 1000) / 2);
}

function visualLoop() {
  if (!isPlaying) return;
  const now = audioCtx.currentTime;
  while (pendingVisual.length && pendingVisual[0].time <= now) {
    currentCol = pendingVisual.shift().col;
    setColHighlight(currentCol);
  }
  requestAnimationFrame(visualLoop);
}

// ─── Play / Stop ──────────────────────────────────────────────────────────────
async function start() {
  if (!audioCtx) await loadAllSamples();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  isPlaying = true;
  playBtn.textContent = 'Stop';
  playBtn.classList.add('playing');
  statusEl.textContent = 'playing';
  statusEl.classList.remove('error');

  pendingVisual = [];
  nextStepCol   = 0;
  nextStepTime  = audioCtx.currentTime + 0.05;

  scheduleAhead();
  requestAnimationFrame(visualLoop);
}

function stop() {
  isPlaying = false;
  clearTimeout(scheduleTimer);
  scheduleTimer = null;
  pendingVisual = [];
  currentCol    = -1;

  playBtn.textContent = 'Play';
  playBtn.classList.remove('playing');
  setColHighlight(-1);
  updateStatus();
}

playBtn.addEventListener('click', () => isPlaying ? stop() : start());

// ─── Init ─────────────────────────────────────────────────────────────────────
buildSetTabs();
renderGrid();
loadAllSamples();
</script>
</body>
</html>
